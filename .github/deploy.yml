name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.KEY }}

          script: |

            set -e

            cd /var/www/insurepal

            echo "Deploy started $(date)" >> deploy.log

            
            git pull origin main >> deploy.log 2>&1


            composer install --no-dev >> deploy.log 2>&1


            php artisan migrate --force >> deploy.log 2>&1

            
            php artisan optimize:cl >> deploy.log 2>&1

            php artisan optimize >> deploy.log 2>&1

            php artisan deploy:record >> deploy.log 2>&1


            echo "Deploy completed $(date)" >> deploy.log